name: Snyk Security (PR)
on:
  pull_request:
    branches:
      - dev
      - main
      - v4/dev
      - v4/main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  snyk:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          check-latest: true

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk dependency scan — charts
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=packages/charts/package.json --policy-path=.snyk

      - name: Snyk dependency scan — react-magma-dom
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=packages/react-magma-dom/package.json --policy-path=.snyk

      - name: Snyk dependency scan — dropzone
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=packages/dropzone/package.json --policy-path=.snyk

      - name: Snyk Code (SAST)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --policy-path=.snyk

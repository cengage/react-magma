name: Deploy Old Docs

# Re-deploys docs for OLD library versions with the client-side CodeSandbox fix
# (#2495) applied. Builds each version once, stores public/ as a docs-archive
# Release asset, then redeploys the cached output on later runs.
# Deploys: v2/v3 latest + all v4+ except latest (computed from git tags).
# Must live on the default branch (dev) -- cron only fires there.
# If auto-disabled after 60 days idle: gh workflow enable deploy-old-docs.yml

on:
  schedule:
    - cron: '0 6 1 * *' # 1st of each month, 06:00 UTC. Not '*/30' (fires day 1 & 31).
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Rebuild from source even if a cached build exists'
        type: boolean
        default: false
      only_version:
        description: 'Deploy only this exact version (e.g. 4.5.0). Blank = full set.'
        type: string
        default: ''

permissions:
  contents: write # docs-archive release + assets
  deployments: write # nwtgck/actions-netlify records a deployment + status
  statuses: write

concurrency:
  group: deploy-old-docs
  cancel-in-progress: false

env:
  ARCHIVE_RELEASE: docs-archive

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      versions: ${{ steps.compute.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags

      - name: Ensure archive release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "$ARCHIVE_RELEASE" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$ARCHIVE_RELEASE" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Old docs prebuilt archive" \
              --notes "Prebuilt static docs for old versions, managed by deploy-old-docs.yml. Each asset is public-<version>.tar.gz. Do not delete." \
              --target "${{ github.sha }}"
          fi

      - name: Compute version set from git tags
        id: compute
        env:
          LEGACY_LATEST_ONLY_MAX: '3' # majors <= this keep only latest; above keep all-but-latest
          ONLY_VERSION: ${{ github.event.inputs.only_version }}
        run: |
          set -euo pipefail

          list_stable() {
            git tag -l "react-magma-dom@$1.*" \
              | sed 's/^react-magma-dom@//' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V
          }

          if [ -n "${ONLY_VERSION:-}" ]; then
            # Validate strictly -- this value flows into actions/checkout `ref:`.
            if ! printf '%s' "$ONLY_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::only_version '$ONLY_VERSION' is not a plain X.Y.Z version."; exit 1
            fi
            if ! git rev-parse -q --verify "refs/tags/react-magma-dom@$ONLY_VERSION" >/dev/null; then
              echo "::error::tag react-magma-dom@$ONLY_VERSION does not exist."; exit 1
            fi
            versions=$(printf '%s\n' "$ONLY_VERSION" | jq -R . | jq -s -c .)
            echo "versions=$versions" >> "$GITHUB_OUTPUT"; exit 0
          fi

          majors=$(git tag -l 'react-magma-dom@*' \
            | sed 's/^react-magma-dom@//' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | cut -d. -f1 | sort -un)

          selected=""
          for m in $majors; do
            stable=$(list_stable "$m")
            [ -n "$stable" ] || continue
            if [ "$m" -le "$LEGACY_LATEST_ONLY_MAX" ]; then
              selected="$selected"$'\n'"$(printf '%s\n' "$stable" | tail -1)"
            else
              # drop latest. sed '$d' is portable; head -n -1 is GNU-only.
              selected="$selected"$'\n'"$(printf '%s\n' "$stable" | sed '$d')"
            fi
          done

          versions=$(printf '%s\n' "$selected" \
            | grep -E '^[0-9]' | sort -V | jq -R . | jq -s -c 'map(select(length>0))')

          count=$(printf '%s' "$versions" | jq 'length')
          echo "Deploy set ($count): $versions"
          # Fail loudly rather than silently deploy nothing on a tag-scheme change.
          if [ "$count" -lt 3 ]; then
            echo "::error::Discovered only $count version(s) (<3); refusing to run."; exit 1
          fi
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  deploy:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false # one bad legacy build must not cancel the rest
      max-parallel: 4
      matrix:
        version: ${{ fromJSON(needs.discover.outputs.versions) }}
    env:
      RM_VERSION: ${{ matrix.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check archive for a cached build
        id: cache
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          set -euo pipefail
          asset="public-${RM_VERSION}.tar.gz"
          hit=false
          if [ "${FORCE_REBUILD:-false}" != "true" ]; then
            if gh release view "$ARCHIVE_RELEASE" --repo "$GITHUB_REPOSITORY" \
                 --json assets -q '.assets[].name' 2>/dev/null | grep -qx "$asset"; then
              hit=true
            fi
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "hit=$hit" >> "$GITHUB_OUTPUT"

      # Cache hit: restore prebuilt output, skip the toolchain entirely.
      - name: Restore prebuilt docs
        if: steps.cache.outputs.hit == 'true'
        run: |
          set -euo pipefail
          mkdir -p site
          gh release download "$ARCHIVE_RELEASE" --repo "$GITHUB_REPOSITORY" \
            --pattern "${{ steps.cache.outputs.asset }}" --output build.tar.gz
          tar xzf build.tar.gz -C site

      # Cache miss / force_rebuild: build from the release tag once.
      - name: Checkout release tag
        if: steps.cache.outputs.hit != 'true'
        uses: actions/checkout@v4
        with:
          ref: react-magma-dom@${{ matrix.version }}
          fetch-depth: 1

      - name: Checkout patch assets from default branch
        if: steps.cache.outputs.hit != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }} # pin to this run's default-branch commit
          path: ._patches
          sparse-checkout: patches/codesandbox
          sparse-checkout-cone-mode: false

      - name: Derive build settings
        if: steps.cache.outputs.hit != 'true'
        id: cfg
        run: |
          set -euo pipefail
          PKG=website/react-magma-docs/package.json
          MAJOR="${RM_VERSION%%.*}"
          has() { grep -q "\"$1\"" "$PKG" && echo true || echo false; }

          NEEDS_PATCH=$(has react-codesandboxer) # absent once a tag already ships the fix
          HAS_REACT=$(has @emotion/react)

          if [ "$MAJOR" -eq 2 ]; then
            VARIANT=actions-v2
          elif [ "$HAS_REACT" = true ]; then
            VARIANT=actions-emotion-react
          else
            VARIANT=actions-emotion-core
          fi

          # emotion-10 (core) family needs the @emotion/styled shim; emotion-11 does not.
          NEEDS_STYLED_IMPORT=$(has @emotion/core)

          {
            echo "needsPatch=$NEEDS_PATCH"
            echo "variant=$VARIANT"
            echo "needsStyledImport=$NEEDS_STYLED_IMPORT"
          } >> "$GITHUB_OUTPUT"

      # Node 22 for all: tags' own .nvmrc (14/16/18) can't npm install today
      # (deps need Node >= 20's global File).
      - name: Setup Node 22
        if: steps.cache.outputs.hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Apply CodeSandbox source patch
        if: steps.cache.outputs.hit != 'true' && steps.cfg.outputs.needsPatch == 'true'
        run: |
          set -euo pipefail
          cp "._patches/patches/codesandbox/${{ steps.cfg.outputs.variant }}.tsx" \
             website/react-magma-docs/src/components/CodeBlock/actions.tsx
          node ._patches/patches/codesandbox/update-package.js

      - name: Disable engine-strict check
        if: steps.cache.outputs.hit != 'true'
        run: echo "engine-strict=false" > .npmrc

      - name: Install
        if: steps.cache.outputs.hit != 'true'
        run: npm install --legacy-peer-deps

      - name: Add @emotion/styled import shim
        if: steps.cache.outputs.hit != 'true' && steps.cfg.outputs.needsStyledImport == 'true'
        run: |
          set -euo pipefail
          F=packages/react-magma-dom/dist/esm/index.js
          test -f "$F" || { echo "::error::expected built artifact $F after install"; exit 1; }
          # Skip if _styled is already declared (some emotion-10 builds import it from
          # @emotion/styled-base); a second declaration breaks the build.
          if ! grep -qE "^import _styled[ =]" "$F"; then
            echo "import _styled from '@emotion/styled';" | cat - "$F" > "$F.tmp" && mv "$F.tmp" "$F"
          fi

      - name: Build docs
        if: steps.cache.outputs.hit != 'true'
        env:
          PATH_PREFIX: /version/${{ matrix.version }}
          NODE_OPTIONS: --openssl-legacy-provider # legacy Gatsby webpack MD4 hashing on modern Node
        run: npm run build:docs

      - name: Archive built output
        if: steps.cache.outputs.hit != 'true'
        run: |
          set -euo pipefail
          OUT=website/react-magma-docs/public
          test -d "$OUT" || { echo "::error::build produced no $OUT"; exit 1; }
          mkdir -p site
          cp -R "$OUT/." site/
          tar czf "${{ steps.cache.outputs.asset }}" -C site .
          gh release upload "$ARCHIVE_RELEASE" --repo "$GITHUB_REPOSITORY" \
            "${{ steps.cache.outputs.asset }}" --clobber

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v1.1
        with:
          publish-dir: './site'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Old-docs redeploy v${{ matrix.version }}'
          enable-pull-request-comment: false
          enable-commit-comment: false
          alias: ${{ matrix.version }} # keep production-deploy unset, or the alias is dropped
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

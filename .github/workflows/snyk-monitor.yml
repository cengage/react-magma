name: Snyk Security (Monitor)
on:
  push:
    branches:
      - main
      - v4/main
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: main
            tag: v5
          - branch: v4/main
            tag: v4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          check-latest: true

      - name: Update NPM version
        run: npm install -g "npm@^11.11.0"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Monitor — charts
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          BRANCH_TAG: ${{ matrix.tag }}
        run: snyk monitor --file=packages/charts/package.json --project-tags=branch="$BRANCH_TAG" --policy-path=.snyk

      - name: Snyk Monitor — react-magma-dom
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          BRANCH_TAG: ${{ matrix.tag }}
        run: snyk monitor --file=packages/react-magma-dom/package.json --project-tags=branch="$BRANCH_TAG" --policy-path=.snyk

      - name: Snyk Monitor — dropzone
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          BRANCH_TAG: ${{ matrix.tag }}
        run: snyk monitor --file=packages/dropzone/package.json --project-tags=branch="$BRANCH_TAG" --policy-path=.snyk

      - name: Snyk Code Test (SAST report)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --policy-path=.snyk
